<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuthDash · Ray的运维工作台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<canvas id="wave-canvas"></canvas>

<div id="app">
  <!-- ===== Topbar ===== -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <div class="logo-icon">A</div>
        <span>Auth<span class="accent-text">Dash</span></span>
        <div class="logo-sub">Ray的运维工作台</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="topbar-time" id="clock">--:--:--</span>
      <div class="topbar-avatar">R</div>
    </div>
  </header>

  <!-- ===== Main ===== -->
  <main class="main">

    <!-- ===== View: Dashboard ===== -->
    <div id="view-dashboard" class="view active">
      <div class="page-header">
        <div>
          <h1 class="page-title">运维工作台</h1>
          <p class="page-sub"></p>
        </div>
        <div class="page-header-right">
          <span class="badge">v0.3</span>
        </div>
      </div>

      <div class="grid">
        <!-- Auto-Login -->
        <div class="card" id="card-autologin">
          <div class="card-header">
            <div class="card-title-group">
              <div class="card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><circle cx="12" cy="16" r="1"/></svg>
              </div>
              <div class="card-title">自动登录</div>
            </div>
            <span class="card-count" id="autologin-count">加载中…</span>
          </div>
          <div class="section-label-sm">常用站点 · 快速直达</div>
          <div class="site-chips" id="site-chips">
            <div class="loading-pulse">加载站点中…</div>
          </div>
          <div class="card-footer-link">
            <a id="btn-show-sites">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
              全部分类 · 按云平台浏览 →
            </a>
            <a id="btn-refresh">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
              刷新
            </a>
          </div>
        </div>

        <!-- DNS Query -->
        <div class="card">
          <div class="card-header">
            <div class="card-title-group">
              <div class="card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
              </div>
              <div class="card-title">DNS 查询</div>
            </div>
            <span class="card-count">工具</span>
          </div>
          <div class="dns-input-row">
            <input type="text" id="dns-input" placeholder="输入域名，如 api.example.com">
            <button class="btn-primary" id="dns-btn">查询</button>
          </div>
          <div class="dns-result" id="dns-result">
            <div class="placeholder">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              <span>输入域名，点击查询</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== View: Site List ===== -->
    <div id="view-sites" class="view">
      <div class="page-header">
        <div class="page-header-left">
          <a class="back-btn" id="btn-back-dashboard">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            返回工作台
          </a>
          <div>
            <h1 class="page-title">自动登录</h1>
            <p class="page-sub">选择站点 · 自动填充凭证</p>
          </div>
        </div>
        <div class="page-header-right">
          <span class="badge" id="sites-count-badge">-- 站点</span>
        </div>
      </div>

      <div class="regions" id="site-regions">
        <div class="loading-pulse">加载站点列表…</div>
      </div>
    </div>

  </main>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script>
// ============================================================
//  Wave Canvas — interactive particle mesh with click ripples
// ============================================================
(function() {
  const canvas = document.getElementById('wave-canvas');
  const ctx = canvas.getContext('2d');

  let W, H, cols, rows;
  let points = [];
  let ripples = [];
  let time = 0;
  let mouseX = -9999, mouseY = -9999;

  const SPACING = 50;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cols = Math.floor(W / SPACING) + 2;
    rows = Math.floor(H / SPACING) + 2;
    points = [];
    for (let r = 0; r <= rows; r++) {
      for (let c = 0; c <= cols; c++) {
        points.push({ ox: c * SPACING, oy: r * SPACING, z: 0, vz: 0 });
      }
    }
  }

  function addRipple(x, y, strength) {
    ripples.push({
      cx: x, cy: y, radius: 0,
      maxRadius: 200 + Math.random() * 40,
      strength: strength || 5,
      speed: 0.6 + Math.random() * 0.4,
    });
    if (ripples.length > 6) ripples.shift();
  }

  function update() {
    time += 0.005;

    // Phase 1: compute target Z
    for (const p of points) {
      const dx = p.ox - W / 2;
      const dy = p.oy - H / 2;
      p.targetZ =
        Math.sin(dx * 0.01 + time * 1.5) * 1.8 +
        Math.cos(dy * 0.012 + time * 1.8) * 1.5 +
        Math.sin((dx + dy) * 0.006 + time * 1.0) * 1.2;

      const md = Math.sqrt((p.ox - mouseX) ** 2 + (p.oy - mouseY) ** 2);
      if (md < 120) {
        p.targetZ += Math.cos(md * 0.02) * 3 * (1 - md / 120);
      }

      for (const rip of ripples) {
        const rd = Math.sqrt((p.ox - rip.cx) ** 2 + (p.oy - rip.cy) ** 2);
        const rDist = rd - rip.radius;
        if (rDist > -50 && rDist < 50) {
          const f = Math.max(0, 1 - Math.abs(rDist) / 50);
          p.targetZ += Math.sin(rd * 0.04 + rip.radius * 0.015) * rip.strength * f;
        }
      }
    }

    // Phase 2: neighbour coupling
    for (let r = 0; r <= rows; r++) {
      for (let c = 0; c <= cols; c++) {
        const p = points[r * (cols + 1) + c];
        if (!p) continue;
        let pull = 0, n = 0;
        if (r > 0)    { pull += points[(r-1)*(cols+1)+c].z - p.z; n++; }
        if (r < rows) { pull += points[(r+1)*(cols+1)+c].z - p.z; n++; }
        if (c > 0)    { pull += points[r*(cols+1)+c-1].z - p.z;   n++; }
        if (c < cols) { pull += points[r*(cols+1)+c+1].z - p.z;   n++; }
        if (n > 0) p.targetZ += (pull / n) * 0.12;
      }
    }

    // Phase 3: spring physics
    for (const p of points) {
      p.vz += (p.targetZ - p.z) * 0.06;
      p.vz *= 0.94;
      p.z += p.vz;
    }

    // Update ripples
    for (let i = ripples.length - 1; i >= 0; i--) {
      ripples[i].radius += ripples[i].speed;
      ripples[i].strength *= 0.996;
      if (ripples[i].radius > ripples[i].maxRadius || ripples[i].strength < 0.3) {
        ripples.splice(i, 1);
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Connections
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const idx = r * (cols + 1) + c;
        const p = points[idx];
        if (!p) continue;

        const pr = points[idx + 1];
        if (pr) {
          const dz = p.z - pr.z;
          const op = Math.max(0, 0.3 - Math.abs(dz) * 0.02);
          ctx.beginPath();
          ctx.moveTo(p.ox, p.oy + p.z);
          ctx.lineTo(pr.ox, pr.oy + pr.z);
          ctx.strokeStyle = `rgba(59,108,255,${op * 0.2})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }

        const pd = points[idx + cols + 1];
        if (pd) {
          const dz = p.z - pd.z;
          const op = Math.max(0, 0.3 - Math.abs(dz) * 0.02);
          ctx.beginPath();
          ctx.moveTo(p.ox, p.oy + p.z);
          ctx.lineTo(pd.ox, pd.oy + pd.z);
          ctx.strokeStyle = `rgba(6,182,212,${op * 0.17})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    // Points
    for (const p of points) {
      const opacity = 0.3 + (p.z + 6) / 18 * 0.4;
      const size = 1.2 + (p.z + 6) / 18 * 1.2;
      ctx.beginPath();
      ctx.arc(p.ox, p.oy + p.z, size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(59,108,255,${opacity * 0.5})`;
      ctx.fill();
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);

  document.addEventListener('click', (e) => {
    addRipple(e.clientX, e.clientY);
  });

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });
  document.addEventListener('mouseleave', () => {
    mouseX = -9999;
    mouseY = -9999;
  });

  document.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    mouseX = t.clientX;
    mouseY = t.clientY;
  }, { passive: true });
  document.addEventListener('touchend', () => {
    mouseX = -9999;
    mouseY = -9999;
  });

  resize();
  loop();
})();

// ===== ===== ===== ===== ===== ===== ===== =====
//  App State
// ===== ===== ===== ===== ===== ===== ===== =====
let configData = [];

// ===== ===== ===== ===== ===== ===== ===== =====
//  Helpers
// ===== ===== ===== ===== ===== ===== ===== =====
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.innerHTML = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.className = 'toast hidden'; }, 4000);
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

const REGION_COLORS = { 'shouxinyun':'#3b82f6','aliyun':'#f59e0b','wuhan_xinchuang':'#10b981','tencent_cloud':'#8b5cf6' };
const REGION_LABELS = { 'shouxinyun':'首信云','aliyun':'阿里云','wuhan_xinchuang':'武汉信创','tencent_cloud':'腾讯云' };
function regionColor(id) { return REGION_COLORS[id] || '#8892a8'; }
function regionLabel(id) { return REGION_LABELS[id] || id; }

// ===== ===== ===== ===== ===== ===== ===== =====
//  Clock
// ===== ===== ===== ===== ===== ===== ===== =====
function tick() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
}
tick(); setInterval(tick, 1000);

// ===== ===== ===== ===== ===== ===== ===== =====
//  View Switching
// ===== ===== ===== ===== ===== ===== ===== =====
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}

document.getElementById('btn-show-sites').addEventListener('click', () => {
  renderSiteList();
  showView('sites');
});

document.getElementById('btn-back-dashboard').addEventListener('click', () => {
  showView('dashboard');
});

// ===== ===== ===== ===== ===== ===== ===== =====
//  Load Config & Render Dashboard
// ===== ===== ===== ===== ===== ===== ===== =====
async function loadConfig() {
  try {
    const resp = await fetch('/api/config');
    configData = await resp.json();
    renderDashboard();
  } catch (e) {
    showToast('❌ 加载配置失败：' + e.message, 'error');
  }
}

function renderDashboard() {
  let totalSites = 0;
  const allChips = [];

  for (const region of configData) {
    for (const site of (region.sites || [])) {
      if (site.type === 'app') continue;
      totalSites++;
      allChips.push({
        sid: site.id,
        sname: site.name || site.id,
        rid: region.id,
        color: REGION_COLORS[region.id] || '#8892a8',
        rlabel: REGION_LABELS[region.id] || region.id,
      });
    }
  }

  document.getElementById('autologin-count').textContent = configData.length + ' 平台 · ' + totalSites + ' 站点';

  const chipsContainer = document.getElementById('site-chips');
  chipsContainer.innerHTML = '';
  const maxChips = 8;
  allChips.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'site-chip' + (i >= maxChips ? ' chip-hidden' : '');
    div.innerHTML = `<span class="chip-dot" style="background:${ch.color}"></span>
      ${escapeHtml(ch.sname)}
      <span class="region-tag">${escapeHtml(ch.rlabel)}</span>`;
    div.addEventListener('click', () => doLogin(ch.sid));
    chipsContainer.appendChild(div);
  });
  if (allChips.length > maxChips) {
    const more = document.createElement('div');
    more.className = 'site-chip chip-more';
    more.textContent = `+${allChips.length - maxChips} 更多`;
    more.addEventListener('click', () => {
      renderSiteList();
      showView('sites');
    });
    chipsContainer.appendChild(more);
  }
}

// ===== ===== ===== ===== ===== ===== ===== =====
//  Site List View
// ===== ===== ===== ===== ===== ===== ===== =====
function renderSiteList(highlightId) {
  const container = document.getElementById('site-regions');
  container.innerHTML = '';

  let total = 0;
  for (const region of configData) {
    const sites = region.sites || [];
    const webSites = sites.filter(s => s.type !== 'app');
    if (webSites.length === 0) continue;
    total += webSites.length;

    const isHighlight = highlightId && region.id === highlightId;
    const section = document.createElement('div');
    section.className = 'region' + (isHighlight ? ' region-highlight' : '');
    section.dataset.regionId = region.id;

    const color = REGION_COLORS[region.id] || '#8892a8';
    const rname = region.name || region.id;

    let cardsHtml = '';
    for (const site of webSites) {
      const sid = escapeHtml(site.id);
      const sname = escapeHtml(site.name || sid);
      const isOrange = site.color === 'orange' ? ' card-orange' : '';
      cardsHtml += `<div class="card${isOrange}" data-site-id="${sid}" data-type="web">
        <div class="card-body">
          <div class="card-title">${sname}</div>
        </div>
      </div>`;
    }

    section.innerHTML = `
      <div class="region-header" data-region="${region.id}">
        <h2><span class="region-dot" style="background:${color}"></span> ${escapeHtml(rname)}</h2>
        <div class="region-header-right">
          <span class="region-count">${webSites.length} 站点</span>
          <span class="region-arrow" id="arrow-${region.id}">▼</span>
        </div>
      </div>
      <div class="region-content" id="region-${region.id}">
        <div class="grid-sites">${cardsHtml}</div>
      </div>`;

    container.appendChild(section);

    const header = section.querySelector('.region-header');
    header.addEventListener('click', () => {
      const content = document.getElementById('region-' + region.id);
      const arrow = document.getElementById('arrow-' + region.id);
      const collapsed = content.classList.toggle('collapsed');
      arrow.textContent = collapsed ? '▶' : '▼';
    });
  }

  document.getElementById('sites-count-badge').textContent = total + ' 站点';

  if (highlightId) {
    const target = document.getElementById('region-' + highlightId);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  attachCardHandlers();
}

function attachCardHandlers() {
  document.querySelectorAll('#view-sites .card').forEach(card => {
    card.addEventListener('click', async () => {
      if (card.classList.contains('loading')) return;
      const siteId = card.dataset.siteId;
      await doLogin(siteId);
    });
  });
}

// ===== ===== ===== ===== ===== ===== ===== =====
//  Login
// ===== ===== ===== ===== ===== ===== ===== =====
async function doLogin(siteId) {
  const cards = document.querySelectorAll(`.card[data-site-id="${siteId}"]`);
  cards.forEach(c => c.classList.add('loading'));

  try {
    const resp = await fetch('/api/login/' + encodeURIComponent(siteId), { method: 'POST' });
    const data = await resp.json();
    if (resp.ok) {
      showToast('✅ ' + data.message, 'success');
    } else {
      showToast('❌ ' + (data.detail || '请求失败'), 'error');
    }
  } catch (e) {
    showToast('❌ 网络错误：' + e.message, 'error');
  } finally {
    cards.forEach(c => c.classList.remove('loading'));
  }
}

//  DNS Query
async function doDnsQuery() {
  const domain = document.getElementById('dns-input').value.trim();
  if (!domain) {
    showToast('⚠️ 请输入域名', 'error');
    return;
  }

  const resultEl = document.getElementById('dns-result');
  resultEl.innerHTML = '<div class="loading-pulse">查询中…</div>';

  try {
    const resp = await fetch('/api/dns/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain })
    });
    const data = await resp.json();

    if (!resp.ok) {
      resultEl.innerHTML = `<div class="dns-error">❌ ${escapeHtml(data.detail || '查询失败')}</div>`;
      return;
    }

    if (!data.records || data.records.length === 0) {
      resultEl.innerHTML = `<div class="dns-empty">没有找到任何记录</div>`;
      return;
    }

    let html = `<div class="dns-meta">${escapeHtml(domain)} · ${data.records.length} 条记录</div>`;
    for (const r of data.records) {
      const ttl = r.ttl ? ` TTL=${r.ttl}` : '';
      const badge = r.rtype ? `<span class="dns-badge">${r.rtype}</span>` : '';
      html += `<div class="dns-record">${badge}<span class="dns-val">${escapeHtml(r.value)}</span><span class="dns-ttl">${ttl}</span></div>`;
    }
    resultEl.innerHTML = html;
  } catch (e) {
    resultEl.innerHTML = `<div class="dns-error">❌ 网络错误：${escapeHtml(e.message)}</div>`;
  }
}

document.getElementById('dns-btn').addEventListener('click', doDnsQuery);
document.getElementById('dns-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doDnsQuery();
});

// Refresh button
document.getElementById('btn-refresh').addEventListener('click', () => {
  renderDashboard();
  showToast('🔄 已刷新', 'success');
});

// ===== ===== ===== ===== ===== ===== ===== =====
//  Init
// ===== ===== ===== ===== ===== ===== ===== =====
loadConfig();
</script>
</body>
</html>
