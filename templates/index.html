<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuthDash · Ray的运维工作台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<canvas id="wave-canvas"></canvas>

<div id="app">
  <!-- ===== Topbar ===== -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <div class="logo-icon">A</div>
        <span>Auth<span class="accent-text">Dash</span></span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="topbar-time" id="clock">--:--:--</span>
      <div class="topbar-avatar">Ray</div>
    </div>
  </header>

  <!-- ===== Main ===== -->
  <main class="main">

    <!-- ===== View: Dashboard ===== -->
    <div id="view-dashboard" class="view active">

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="stat-platforms">-</div>
          <div class="stat-label">已注册平台</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-sites">-</div>
          <div class="stat-label">已注册站点</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-tools">-</div>
          <div class="stat-label">工具</div>
        </div>
      </div>

      <!-- DNS tool -->
      <div class="tools-row">
        <div class="tool-card">
          <div class="tool-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          </div>
          <div class="tool-body">
            <div class="tool-name">DNS 查询</div>
            <input type="text" id="dns-input" placeholder="输入域名，如 api.example.com">
          </div>
          <button class="btn-primary" id="dns-btn" style="padding:8px 16px;font-size:0.82rem;">查询</button>
        </div>
      </div>
      <div id="dns-result" class="dns-result"></div>

      <!-- Platform grid -->
      <div class="section-label">
        平台分类 <span class="count" id="platform-count">· 加载中…</span>
      </div>
      <div class="platform-grid" id="platform-grid">
        <div class="loading-pulse">加载平台分类…</div>
      </div>
    </div>

  </main>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script>
// ============================================================
//  Wave Canvas — interactive particle mesh with click ripples
// ============================================================
(function() {
  const canvas = document.getElementById('wave-canvas');
  const ctx = canvas.getContext('2d');

  let W, H, cols, rows;
  let points = [];
  let ripples = [];
  let time = 0;
  let mouseX = -9999, mouseY = -9999;

  const SPACING = 50;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cols = Math.floor(W / SPACING) + 2;
    rows = Math.floor(H / SPACING) + 2;
    points = [];
    for (let r = 0; r <= rows; r++) {
      for (let c = 0; c <= cols; c++) {
        points.push({ ox: c * SPACING, oy: r * SPACING, z: 0, vz: 0 });
      }
    }
  }

  function addRipple(x, y, strength) {
    ripples.push({
      cx: x, cy: y, radius: 0,
      maxRadius: 200 + Math.random() * 40,
      strength: strength || 5,
      speed: 0.6 + Math.random() * 0.4,
    });
    if (ripples.length > 6) ripples.shift();
  }

  function update() {
    time += 0.005;

    for (const p of points) {
      const dx = p.ox - W / 2;
      const dy = p.oy - H / 2;
      p.targetZ =
        Math.sin(dx * 0.01 + time * 1.5) * 1.8 +
        Math.cos(dy * 0.012 + time * 1.8) * 1.5 +
        Math.sin((dx + dy) * 0.006 + time * 1.0) * 1.2;

      const md = Math.sqrt((p.ox - mouseX) ** 2 + (p.oy - mouseY) ** 2);
      if (md < 120) {
        p.targetZ += Math.cos(md * 0.02) * 3 * (1 - md / 120);
      }

      for (const rip of ripples) {
        const rd = Math.sqrt((p.ox - rip.cx) ** 2 + (p.oy - rip.cy) ** 2);
        const rDist = rd - rip.radius;
        if (rDist > -50 && rDist < 50) {
          const f = Math.max(0, 1 - Math.abs(rDist) / 50);
          p.targetZ += Math.sin(rd * 0.04 + rip.radius * 0.015) * rip.strength * f;
        }
      }
    }

    for (let r = 0; r <= rows; r++) {
      for (let c = 0; c <= cols; c++) {
        const p = points[r * (cols + 1) + c];
        if (!p) continue;
        let pull = 0, n = 0;
        if (r > 0)    { pull += points[(r-1)*(cols+1)+c].z - p.z; n++; }
        if (r < rows) { pull += points[(r+1)*(cols+1)+c].z - p.z; n++; }
        if (c > 0)    { pull += points[r*(cols+1)+c-1].z - p.z;   n++; }
        if (c < cols) { pull += points[r*(cols+1)+c+1].z - p.z;   n++; }
        if (n > 0) p.targetZ += (pull / n) * 0.12;
      }
    }

    for (const p of points) {
      p.vz += (p.targetZ - p.z) * 0.06;
      p.vz *= 0.94;
      p.z += p.vz;
    }

    for (let i = ripples.length - 1; i >= 0; i--) {
      ripples[i].radius += ripples[i].speed;
      ripples[i].strength *= 0.996;
      if (ripples[i].radius > ripples[i].maxRadius || ripples[i].strength < 0.3) {
        ripples.splice(i, 1);
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const idx = r * (cols + 1) + c;
        const p = points[idx];
        if (!p) continue;

        const pr = points[idx + 1];
        if (pr) {
          const dz = p.z - pr.z;
          const op = Math.max(0, 0.3 - Math.abs(dz) * 0.02);
          ctx.beginPath();
          ctx.moveTo(p.ox, p.oy + p.z);
          ctx.lineTo(pr.ox, pr.oy + pr.z);
          ctx.strokeStyle = `rgba(59,108,255,${op * 0.2})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }

        const pd = points[idx + cols + 1];
        if (pd) {
          const dz = p.z - pd.z;
          const op = Math.max(0, 0.3 - Math.abs(dz) * 0.02);
          ctx.beginPath();
          ctx.moveTo(p.ox, p.oy + p.z);
          ctx.lineTo(pd.ox, pd.oy + pd.z);
          ctx.strokeStyle = `rgba(6,182,212,${op * 0.17})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    for (const p of points) {
      const opacity = 0.3 + (p.z + 6) / 18 * 0.4;
      const size = 1.2 + (p.z + 6) / 18 * 1.2;
      ctx.beginPath();
      ctx.arc(p.ox, p.oy + p.z, size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(59,108,255,${opacity * 0.5})`;
      ctx.fill();
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);

  document.addEventListener('click', (e) => {
    addRipple(e.clientX, e.clientY);
  });

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });
  document.addEventListener('mouseleave', () => {
    mouseX = -9999;
    mouseY = -9999;
  });

  document.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    mouseX = t.clientX;
    mouseY = t.clientY;
  }, { passive: true });
  document.addEventListener('touchend', () => {
    mouseX = -9999;
    mouseY = -9999;
  });

  resize();
  loop();
})();

// ===== ===== ===== ===== ===== ===== ===== =====
//  App State
// ===== ===== ===== ===== ===== ===== ===== =====
let configData = [];

// ===== ===== ===== ===== ===== ===== ===== =====
//  Helpers
// ===== ===== ===== ===== ===== ===== ===== =====
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.innerHTML = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.className = 'toast hidden'; }, 4000);
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

const REGION_COLORS = { 'shouxinyun':'#3b82f6','aliyun':'#f59e0b','wuhan_xinchuang':'#10b981','tencent_cloud':'#8b5cf6' };
const REGION_LABELS = { 'shouxinyun':'首信云','aliyun':'阿里云','wuhan_xinchuang':'武汉信创','tencent_cloud':'腾讯云' };
function regionColor(id) { return REGION_COLORS[id] || '#8892a8'; }
function regionLabel(id) { return REGION_LABELS[id] || id; }

// ===== ===== ===== ===== ===== ===== ===== =====
//  Clock
// ===== ===== ===== ===== ===== ===== ===== =====
function tick() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
}
tick(); setInterval(tick, 1000);

// ===== ===== ===== ===== ===== ===== ===== =====
//  Load Config & Render Dashboard
// ===== ===== ===== ===== ===== ===== ===== =====
async function loadConfig() {
  try {
    const resp = await fetch('/api/config');
    configData = await resp.json();
    renderDashboard();
  } catch (e) {
    showToast('❌ 加载配置失败：' + e.message, 'error');
  }
}

function renderDashboard() {
  // — Stats —
  let platformCount = 0;
  let siteCount = 0;
  for (const region of configData) {
    const webSites = (region.sites || []).filter(s => s.type !== 'app');
    if (webSites.length > 0) platformCount++;
    siteCount += webSites.length;
  }
  document.getElementById('stat-platforms').textContent = platformCount;
  document.getElementById('stat-sites').textContent = siteCount;
  document.getElementById('stat-tools').textContent = '1';

  // — Platform grid —
  const grid = document.getElementById('platform-grid');
  grid.innerHTML = '';

  for (const region of configData) {
    const webSites = (region.sites || []).filter(s => s.type !== 'app');
    const isEmpty = webSites.length === 0;

    const color = REGION_COLORS[region.id] || '#8892a8';
    const rname = region.name || region.id;

    const card = document.createElement('div');
    card.className = 'platform-card' + (isEmpty ? ' empty' : '');
    card.dataset.regionId = region.id;

    let sitesHtml = '';
    if (!isEmpty) {
      for (const site of webSites) {
        const sid = escapeHtml(site.id);
        const sname = escapeHtml(site.name || sid);
        const initial = sname.charAt(0);
        sitesHtml += `<div class="site-item" data-site-id="${sid}">
          <span class="si-icon">${escapeHtml(initial)}</span>
          <span class="si-label">${sname}</span>
        </div>`;
      }
    }

    card.innerHTML = `
      <div class="pf-header">
        <span class="platform-dot" style="background:${color}"></span>
        <span class="pf-name">${escapeHtml(rname)}</span>
        <span class="pf-count">${webSites.length}</span>
      </div>
      ${sitesHtml ? `<div class="pf-sites">${sitesHtml}</div>` : ''}`;

    grid.appendChild(card);
  }

  // — Attach login handlers —
  grid.querySelectorAll('.site-item').forEach(el => {
    el.addEventListener('click', async () => {
      if (el.classList.contains('loading')) return;
      el.classList.add('loading');
      await doLogin(el.dataset.siteId);
      el.classList.remove('loading');
    });
  });

  // — Update platform count label —
  document.getElementById('platform-count').textContent =
    '· ' + platformCount + ' 个平台 · ' + siteCount + ' 个站点';
}

// ===== ===== ===== ===== ===== ===== ===== =====
//  Login
// ===== ===== ===== ===== ===== ===== ===== =====
async function doLogin(siteId) {
  const items = document.querySelectorAll(`.site-item[data-site-id="${siteId}"]`);
  items.forEach(el => el.style.opacity = '0.5');

  try {
    const resp = await fetch('/api/login/' + encodeURIComponent(siteId), { method: 'POST' });
    const data = await resp.json();
    if (resp.ok) {
      showToast('✅ ' + data.message, 'success');
    } else {
      showToast('❌ ' + (data.detail || '请求失败'), 'error');
    }
  } catch (e) {
    showToast('❌ 网络错误：' + e.message, 'error');
  } finally {
    items.forEach(el => el.style.opacity = '');
  }
}

//  DNS Query
async function doDnsQuery() {
  const domain = document.getElementById('dns-input').value.trim();
  if (!domain) {
    showToast('⚠️ 请输入域名', 'error');
    return;
  }

  const resultEl = document.getElementById('dns-result');
  resultEl.innerHTML = '<div class="loading-pulse">查询中…</div>';

  try {
    const resp = await fetch('/api/dns/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain })
    });
    const data = await resp.json();

    if (!resp.ok) {
      resultEl.innerHTML = `<div class="dns-error">❌ ${escapeHtml(data.detail || '查询失败')}</div>`;
      return;
    }

    if (!data.records || data.records.length === 0) {
      resultEl.innerHTML = `<div class="dns-empty">没有找到任何记录</div>`;
      return;
    }

    let html = `<div class="dns-meta">${escapeHtml(domain)} · ${data.records.length} 条记录</div>`;
    for (const r of data.records) {
      const ttl = r.ttl ? ` TTL=${r.ttl}` : '';
      const badge = r.rtype ? `<span class="dns-badge">${r.rtype}</span>` : '';
      html += `<div class="dns-record">${badge}<span class="dns-val">${escapeHtml(r.value)}</span><span class="dns-ttl">${ttl}</span></div>`;
    }
    resultEl.innerHTML = html;
  } catch (e) {
    resultEl.innerHTML = `<div class="dns-error">❌ 网络错误：${escapeHtml(e.message)}</div>`;
  }
}

document.getElementById('dns-btn').addEventListener('click', doDnsQuery);
document.getElementById('dns-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doDnsQuery();
});

// ===== ===== ===== ===== ===== ===== ===== =====
//  Init
// ===== ===== ===== ===== ===== ===== ===== =====
loadConfig();
</script>
</body>
</html>
