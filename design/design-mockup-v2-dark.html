<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuthDash · 暗色科技风 设计稿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
  background: #0f1117;
  color: #e1e4e8;
  padding: 0;
  font-size: 17px;
  min-height: 100vh;
}

/* ── Grid background ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: linear-gradient(rgba(88,166,255,0.035) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(88,166,255,0.035) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}
#app { position: relative; z-index: 1; }

/* ── Topbar ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.logo {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #58a6ff, #3fb950);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 0.85rem;
}
.topbar-title { font-size: 1rem; font-weight: 700; color: #f0f6fc; }
.topbar-title span { color: #58a6ff; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.topbar-time {
  font-size: 0.82rem; font-weight: 500;
  color: #8b949e; font-variant-numeric: tabular-nums;
}
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, #58a6ff, #3fb950);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 0.7rem;
}

/* ── Main ── */
.main { max-width: 1100px; margin: 0 auto; padding: 24px; }

/* ── Stats ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 18px 16px;
  text-align: center;
}
.stat-card .num {
  font-size: 2rem; font-weight: 700;
  color: #f0f6fc; line-height: 1.1;
}
.stat-card .label {
  font-size: 0.75rem; color: #8b949e;
  margin-top: 3px;
}

/* ── Tools Row ── */
.tools-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.tool-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 10px;
}
.tool-card .tool-icon {
  width: 34px; height: 34px;
  background: #1c2333;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tool-card .tool-icon svg { width: 18px; height: 18px; color: #58a6ff; }
.tool-card .tool-body { flex: 1; }
.tool-card .tool-name { font-size: 0.82rem; font-weight: 600; color: #f0f6fc; margin-bottom: 2px; }
.tool-card input {
  width: 100%; padding: 5px 0;
  border: none; border-bottom: 1px solid #30363d;
  font-size: 0.82rem; font-family: inherit;
  outline: none; background: transparent;
  color: #e1e4e8; transition: border-color 0.15s;
}
.tool-card input:focus { border-bottom-color: #58a6ff; }
.tool-card input::placeholder { color: #484f58; }
.tool-btn {
  padding: 7px 14px;
  background: #1c2333;
  color: #58a6ff;
  border: 1px solid #30363d;
  border-radius: 6px;
  font-size: 0.8rem; font-weight: 500;
  cursor: pointer; transition: background 0.15s;
  font-family: inherit;
}
.tool-btn:hover { background: #30363d; }

/* ── Section Label ── */
.section-label {
  font-size: 0.9rem; font-weight: 600;
  color: #f0f6fc;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid #21262d;
  display: flex; align-items: center; gap: 8px;
}
.section-label .count {
  font-size: 0.75rem; font-weight: 500;
  color: #8b949e;
}

/* ── Platform Grid ── */
.platform-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.platform-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 16px 16px 12px;
  transition: border-color 0.2s;
}
.platform-card:hover { border-color: #58a6ff; }
.platform-card .pf-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #21262d;
}
.platform-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.platform-card .pf-name { font-size: 0.85rem; font-weight: 600; color: #f0f6fc; flex: 1; }
.platform-card .pf-count {
  font-size: 0.7rem; color: #8b949e;
  font-weight: 500;
}
.platform-card .pf-sites {
  display: flex; flex-direction: column; gap: 4px;
}
.site-item {
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 0.8rem; font-weight: 500;
  color: #e1e4e8;
  cursor: pointer;
  transition: all 0.12s;
  display: flex; align-items: center; gap: 8px;
}
.site-item:hover {
  background: #1c2333;
  color: #58a6ff;
}
.site-item .si-icon {
  width: 20px; height: 20px;
  background: #1c2333;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; color: #58a6ff; font-weight: 700;
  flex-shrink: 0;
}
.site-item .si-label { flex: 1; }
.platform-card.empty { opacity: 0.35; }

/* ── DNS Result ── */
.dns-result {
  margin: -12px 0 24px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 0.82rem;
}

/* ── Footnote ── */
.footnote {
  text-align: center; padding: 24px 0;
  font-size: 0.72rem; color: #484f58;
}

/* ── Responsive ── */
@media (max-width: 860px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .tools-row { grid-template-columns: 1fr; }
  .platform-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 540px) {
  .stats-row { grid-template-columns: 1fr; }
  .platform-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="app">

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">A</div>
    <span class="topbar-title">⚡ Auth<span>Dash</span></span>
  </div>
  <div class="topbar-right">
    <span class="topbar-time">--:--:--</span>
    <div class="avatar">R</div>
  </div>
</div>

<div class="main">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="num">4</div>
      <div class="label">📦 已注册平台</div>
    </div>
    <div class="stat-card">
      <div class="num">10</div>
      <div class="label">🔗 已注册站点</div>
    </div>
    <div class="stat-card">
      <div class="num">1</div>
      <div class="label">🛠 工具</div>
    </div>
  </div>

  <!-- Tools -->
  <div class="tools-row">
    <div class="tool-card">
      <div class="tool-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
      </div>
      <div class="tool-body">
        <div class="tool-name">🌐 DNS 查询</div>
        <input type="text" placeholder="输入域名，如 api.example.com">
      </div>
      <button class="tool-btn">查询</button>
    </div>
  </div>

  <!-- Platforms -->
  <div class="section-label">
    📂 平台分类 <span class="count">· 4 个平台 · 10 个站点</span>
  </div>

  <div class="platform-grid">

    <div class="platform-card">
      <div class="pf-header">
        <span class="platform-dot" style="background:#3b82f6"></span>
        <span class="pf-name">首信云</span>
        <span class="pf-count">2</span>
      </div>
      <div class="pf-sites">
        <div class="site-item"><span class="si-icon">互</span><span class="si-label">互联网堡垒机</span></div>
        <div class="site-item"><span class="si-icon">政</span><span class="si-label">政务外网堡垒机</span></div>
      </div>
    </div>

    <div class="platform-card">
      <div class="pf-header">
        <span class="platform-dot" style="background:#f59e0b"></span>
        <span class="pf-name">阿里云</span>
        <span class="pf-count">4</span>
      </div>
      <div class="pf-sites">
        <div class="site-item"><span class="si-icon">V</span><span class="si-label">VPN管理</span></div>
        <div class="site-item"><span class="si-icon">V</span><span class="si-label">VPN登录</span></div>
        <div class="site-item"><span class="si-icon">堡</span><span class="si-label">堡垒机</span></div>
        <div class="site-item"><span class="si-icon">日</span><span class="si-label">日志易</span></div>
      </div>
    </div>

    <div class="platform-card">
      <div class="pf-header">
        <span class="platform-dot" style="background:#10b981"></span>
        <span class="pf-name">武汉信创云</span>
        <span class="pf-count">1</span>
      </div>
      <div class="pf-sites">
        <div class="site-item"><span class="si-icon">资</span><span class="si-label">资源管理模块</span></div>
      </div>
    </div>

    <div class="platform-card">
      <div class="pf-header">
        <span class="platform-dot" style="background:#8b5cf6"></span>
        <span class="pf-name">资源分发平台</span>
        <span class="pf-count">2</span>
      </div>
      <div class="pf-sites">
        <div class="site-item"><span class="si-icon">政</span><span class="si-label">政务网堡垒机</span></div>
        <div class="site-item"><span class="si-icon">互</span><span class="si-label">互联网堡垒机</span></div>
      </div>
    </div>

    <div class="platform-card empty">
      <div class="pf-header">
        <span class="platform-dot" style="background:#8b5cf6"></span>
        <span class="pf-name">腾讯云</span>
        <span class="pf-count">0</span>
      </div>
    </div>

  </div>

  <div class="footnote">🌙 暗色科技风 · 设计稿 v1 · design/ 归档</div>

</div>

</div>

</body>
</html>
